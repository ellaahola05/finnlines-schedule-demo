<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oma näkymä — Finnlines</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .contract-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .contract-item {
      background: #f0f4f9;
      border-radius: 6px;
      padding: 0.8rem 1rem;
    }

    .contract-item .ci-label {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 0.2rem;
    }

    .contract-item .ci-value {
      font-weight: bold;
      color: #003366;
      font-size: 0.95rem;
    }

    .wish-legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    .wish-legend span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
    }

    .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
    .dot-green { background: #28a745; }
    .dot-red   { background: #dc3545; }
    .dot-gray  { background: #aaa; }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .month-nav button {
      background: #e0e7ef;
      color: #003366;
      padding: 0.3rem 0.8rem;
      font-size: 0.9rem;
    }

    .month-nav button:hover { background: #c8d6e8; }

    .month-nav span {
      font-weight: bold;
      font-size: 1rem;
      color: #003366;
      min-width: 140px;
      text-align: center;
    }

    /* Kalenteri */
    .calendar-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }

    .calendar-header div {
      text-align: center;
      font-weight: bold;
      font-size: 0.82rem;
      color: #003366;
      padding: 0.3rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day {
      background: #ffffff;
      border: 1px solid #dde3ea;
      border-radius: 5px;
      padding: 0.4rem;
      min-height: 72px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .cal-day:hover { border-color: #003366; }
    .cal-day.empty { background: #f4f6f9; border-color: transparent; cursor: default; }
    .cal-day.weekend { background: #f9f0ff; }
    .cal-day.holiday { background: #fff3cd; }
    .cal-day.past    { opacity: 0.55; cursor: default; }

    .wish-available   { background: #d4edda !important; border-color: #28a745 !important; }
    .wish-unavailable { background: #f8d7da !important; border-color: #dc3545 !important; }

    .day-num { font-weight: bold; font-size: 0.85rem; margin-bottom: 3px; }

    .shift-tag {
      display: inline-block;
      background: #003366;
      color: white;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.72rem;
      margin-top: 2px;
    }

    .holiday-name {
      font-size: 0.68rem;
      color: #856404;
      line-height: 1.2;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main>
    <h1 id="page-title">Oma näkymä</h1>
    <div id="alert-container"></div>

    <!-- Sopimusinfo -->
    <div class="card" id="contract-card">
      <h2>Sopimustiedot</h2>
      <div class="contract-grid" id="contract-grid">
        <!-- Täytetään JS:llä -->
      </div>
    </div>

    <!-- Kalenteri + toiveet -->
    <div class="card">
      <h2>Kalenteri & toiveet</h2>

      <div class="wish-legend">
        <span><span class="dot dot-green"></span> Haluaa töihin</span>
        <span><span class="dot dot-red"></span> Ei pysty</span>
        <span><span class="dot dot-gray"></span> Ei väliä (oletus)</span>
      </div>

      <p style="font-size:0.85rem;color:#555;margin-bottom:1rem;">
        Klikkaa päivää vaihtaaksesi toivetta. Mustat merkit ovat sinulle merkityt vuorot hyväksytyssä listassa.
      </p>

      <!-- Kuukauden valinta -->
      <div class="month-nav">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <span id="month-label"></span>
        <button onclick="changeMonth(1)">&#8594;</button>
        <button onclick="saveWishes()" style="background:#003366;color:white;margin-left:1rem;">Tallenna toiveet</button>
      </div>

      <div class="calendar-header">
        <div>Ma</div><div>Ti</div><div>Ke</div>
        <div>To</div><div>Pe</div>
        <div style="color:#7a4aad;">La</div>
        <div style="color:#7a4aad;">Su</div>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <!-- Omat vuorot listana -->
    <div class="card" id="my-shifts-card">
      <h2>Tulevat vuorosi tässä kuussa</h2>
      <div id="my-shifts-list">
        <p style="color:#888;font-size:0.9rem;">Vuorolista ei ole vielä valmis tai hyväksytty.</p>
      </div>
    </div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/scheduler.js"></script>
  <script src="js/app.js"></script>
  <script>
    let session = null;
    let employee = null;
    let currentYear, currentMonth;
    let currentWishes = {};

    const MONTH_NAMES = ["Tammikuu","Helmikuu","Maaliskuu","Huhtikuu","Toukokuu","Kesäkuu",
                         "Heinäkuu","Elokuu","Syyskuu","Lokakuu","Marraskuu","Joulukuu"];

    document.addEventListener("DOMContentLoaded", () => {
      session = requireLogin();
      if (!session) return;

      const employees = loadData("employees", DEFAULT_EMPLOYEES);
      employee = employees.find(e => e.id === session.employeeId);
      if (!employee) { showAlert("Profiilia ei löydy.", "error"); return; }

      document.getElementById("page-title").textContent = "Hei, " + employee.name.split(" ")[0] + "!";

      renderContractInfo();

      const today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth() + 1;

      renderCalendar();
      renderMyShifts();
    });

    // ===== SOPIMUSINFO =====
    function renderContractInfo() {
      const contract = CONTRACT_TYPES[employee.contract] || { name: employee.contract };
      const hoursInfo = contract.weeklyHours
        ? contract.weeklyHours + "h / viikko"
        : (contract.minWeeklyHours + "–" + contract.maxWeeklyHours + "h / viikko");

      const items = [
        { label: "Tiimi", value: employee.team },
        { label: "Sopimus", value: contract.name },
        { label: "Viikkotunnit", value: hoursInfo },
        { label: "Viikonloput", value: employee.weekendAllowed ? "Mahdolliset" : "Ei" },
        { label: "Vuorotyypit", value: employee.allowedShifts.map(s =>
            `<span class="badge badge-blue">${s}</span>`).join(" ") }
      ];

      const grid = document.getElementById("contract-grid");
      grid.innerHTML = items.map(i => `
        <div class="contract-item">
          <div class="ci-label">${i.label}</div>
          <div class="ci-value">${i.value}</div>
        </div>
      `).join("");
    }

    // ===== KALENTERI =====
    function renderCalendar() {
      document.getElementById("month-label").textContent =
        MONTH_NAMES[currentMonth - 1] + " " + currentYear;

      // Lataa tämän kuukauden toiveet
      const allWishes = loadData("wishes", {});
      const monthKey = currentYear + "-" + String(currentMonth).padStart(2, "0");
      currentWishes = (allWishes[session.employeeId]?.[monthKey]) || {};

      // Lataa hyväksytty lista
      const schedule = loadData("current_schedule", {});
      const approved = loadData("schedule_approved", false);

      const days = getDaysInMonth(currentYear, currentMonth);
      const today = toDateStr(new Date());

      const grid = document.getElementById("calendar-grid");
      grid.innerHTML = "";

      // Tyhjät ennen kuukauden alkua
      const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
      const emptyBefore = (firstDay === 0) ? 6 : firstDay - 1;
      for (let i = 0; i < emptyBefore; i++) {
        const empty = document.createElement("div");
        empty.className = "cal-day empty";
        grid.appendChild(empty);
      }

      days.forEach(dateStr => {
        const weekend = isWeekend(dateStr);
        const holiday = isHoliday(dateStr);
        const isPast = dateStr < today;
        const wish = currentWishes[dateStr] || "neutral";

        // Onko vuoro tänä päivänä (hyväksytystä listasta)
        const shiftCode = approved && schedule[dateStr] ? schedule[dateStr][employee.id] : null;

        const div = document.createElement("div");
        let cls = "cal-day";
        if (weekend) cls += " weekend";
        if (holiday) cls += " holiday";
        if (isPast) cls += " past";
        if (wish !== "neutral") cls += " wish-" + wish;
        div.className = cls;

        const dayNum = new Date(dateStr).getDate();
        const wishIcon = wish === "available" ? "✅" : wish === "unavailable" ? "❌" : "";
        const shiftHtml = shiftCode
          ? `<div><span class="shift-tag">${shiftCode}</span></div>` : "";
        const holidayHtml = FINNISH_HOLIDAYS[dateStr]
          ? `<div class="holiday-name">${FINNISH_HOLIDAYS[dateStr]}</div>` : "";

        div.innerHTML = `
          <div class="day-num">${dayNum} ${wishIcon}</div>
          ${shiftHtml}
          ${holidayHtml}
        `;

        // Klikkaus vaihtaa toiveen (ei menneisyydessä, ei pyhässä jossa ei tehdä töitä)
        if (!isPast) {
          div.addEventListener("click", () => toggleWish(dateStr, div));
        }

        grid.appendChild(div);
      });

      renderMyShifts();
    }

    // ===== TOIVEEN VAIHTO =====
    function toggleWish(dateStr, el) {
      const current = currentWishes[dateStr] || "neutral";
      const next = { neutral: "available", available: "unavailable", unavailable: "neutral" };
      const newWish = next[current];

      if (newWish === "neutral") {
        delete currentWishes[dateStr];
      } else {
        currentWishes[dateStr] = newWish;
      }

      // Päivitä tyyli
      el.classList.remove("wish-neutral", "wish-available", "wish-unavailable");
      if (newWish !== "neutral") el.classList.add("wish-" + newWish);

      const dayNum = new Date(dateStr).getDate();
      const wishIcon = newWish === "available" ? "✅" : newWish === "unavailable" ? "❌" : "";

      const schedule = loadData("current_schedule", {});
      const approved = loadData("schedule_approved", false);
      const shiftCode = approved && schedule[dateStr] ? schedule[dateStr][employee.id] : null;
      const shiftHtml = shiftCode ? `<div><span class="shift-tag">${shiftCode}</span></div>` : "";
      const holidayHtml = FINNISH_HOLIDAYS[dateStr]
        ? `<div class="holiday-name">${FINNISH_HOLIDAYS[dateStr]}</div>` : "";

      el.innerHTML = `
        <div class="day-num">${dayNum} ${wishIcon}</div>
        ${shiftHtml}
        ${holidayHtml}
      `;
      el.addEventListener("click", () => toggleWish(dateStr, el));
    }

    // ===== TALLENNA TOIVEET =====
    function saveWishes() {
      const allWishes = loadData("wishes", {});
      if (!allWishes[session.employeeId]) allWishes[session.employeeId] = {};
      const monthKey = currentYear + "-" + String(currentMonth).padStart(2, "0");
      allWishes[session.employeeId][monthKey] = currentWishes;
      saveData("wishes", allWishes);
      showAlert("Toiveet tallennettu!", "success");
    }

    // ===== KUUKAUDEN VAIHTO =====
    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth > 12) { currentMonth = 1; currentYear++; }
      if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
      renderCalendar();
    }

    // ===== OMAT VUOROT LISTANA =====
    function renderMyShifts() {
      const schedule = loadData("current_schedule", {});
      const approved = loadData("schedule_approved", false);
      const container = document.getElementById("my-shifts-list");

      if (!approved || Object.keys(schedule).length === 0) {
        container.innerHTML = `<p style="color:#888;font-size:0.9rem;">Vuorolista ei ole vielä valmis tai hyväksytty.</p>`;
        return;
      }

      const myShifts = [];
      Object.entries(schedule).forEach(([dateStr, day]) => {
        const shiftCode = day[employee.id];
        if (!shiftCode) return;
        const d = new Date(dateStr);
        const m = d.getMonth() + 1;
        if (m === currentMonth && d.getFullYear() === currentYear) {
          myShifts.push({ dateStr, shiftCode });
        }
      });

      if (myShifts.length === 0) {
        container.innerHTML = `<p style="color:#888;font-size:0.9rem;">Sinulle ei ole merkitty vuoroja tässä kuussa.</p>`;
        return;
      }

      const DAY_NAMES = ["Su","Ma","Ti","Ke","To","Pe","La"];
      container.innerHTML = myShifts.map(({ dateStr, shiftCode }) => {
        const d = new Date(dateStr);
        const dayName = DAY_NAMES[d.getDay()];
        const shift = SHIFT_TYPES[shiftCode] || {};
        const holiday = FINNISH_HOLIDAYS[dateStr] ? ` — ${FINNISH_HOLIDAYS[dateStr]}` : "";
        return `
          <div style="display:flex;align-items:center;gap:0.8rem;padding:0.5rem 0;border-bottom:1px solid #eee;">
            <span style="width:90px;font-weight:bold;color:#003366;">${dayName} ${d.getDate()}.${d.getMonth()+1}.</span>
            <span class="badge badge-blue">${shiftCode}</span>
            <span style="font-size:0.88rem;color:#555;">${shift.start || ""} – ${shift.end || ""} ${shift.includesCheckIn ? "✈ lähtöselvitys 12–14" : ""}</span>
            <span style="font-size:0.8rem;color:#999;">${holiday}</span>
          </div>
        `;
      }).join("");
    }
  </script>

</body>
</html>
