<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirjaudu — Finnlines Työvuorot</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #003366 0%, #00509e 100%);
    }

    .login-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .login-logo h1 {
      font-size: 1.4rem;
      color: #003366;
      margin-bottom: 0.3rem;
    }

    .login-logo p {
      font-size: 0.88rem;
      color: #777;
    }

    .login-box label {
      margin-top: 1rem;
    }

    .login-box button {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.75rem;
      font-size: 1rem;
    }

    .login-hint {
      margin-top: 1.2rem;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      line-height: 1.6;
    }

    #login-error {
      display: none;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">
      <h1>Finnlines</h1>
      <p>Työvuorokalenteri</p>
    </div>

    <div id="login-error" class="alert alert-error">
      Väärä käyttäjätunnus tai salasana.
    </div>

    <label>Käyttäjätunnus</label>
    <input type="text" id="username" placeholder="etunimi.sukunimi" autocomplete="username" />

    <label>Salasana</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />

    <button onclick="handleLogin()">Kirjaudu sisään</button>

    <div class="login-hint">
      Oletussalasana: <strong>finnlines</strong><br>
      Käyttäjätunnus: <strong>etunimi.sukunimi</strong>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    // Jos jo kirjautunut, ohjataan suoraan eteenpäin
    document.addEventListener("DOMContentLoaded", () => {
      initEmployees();
      initUsers();
      const session = getSession();
      if (session) {
        redirect(session);
      }

      // Enter-näppäin kirjautuu sisään
      document.getElementById("password").addEventListener("keydown", e => {
        if (e.key === "Enter") handleLogin();
      });
      document.getElementById("username").addEventListener("keydown", e => {
        if (e.key === "Enter") handleLogin();
      });
    });

    function handleLogin() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const user = loginUser(username, password);

      if (!user) {
        document.getElementById("login-error").style.display = "block";
        document.getElementById("password").value = "";
        return;
      }

      redirect(user);
    }

    function redirect(user) {
      if (user.role === "manager") {
        window.location.href = "index.html";
      } else {
        window.location.href = "my-schedule.html";
      }
    }
  </script>

</body>
</html>
